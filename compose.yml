services:
    php:
        container_name: php
        build:
            context: ./
            dockerfile: docker/Dockerfile
            target: php_dev
            args:
                TZ: ${TZ}
        restart: always
        volumes:
            - ./app:/app:rw,cached

    postgres:
        container_name: postgres
        image: postgres:16.1-alpine
        restart: always
        environment:
            LANG: ${POSTGRES_LANG}.utf8
            POSTGRES_INITDB_ARGS: --locale-provider=icu --icu-locale=${POSTGRES_LANG}
            POSTGRES_DB: ${POSTGRES_DB}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
            POSTGRES_USER: ${POSTGRES_USER}
        ports:
            - ${POSTGRES_PORT}:5432
        volumes:
            - postgres_data:/var/lib/postgresql/data:rw
        labels:
            # See https://symfony.com/doc/current/setup/symfony_server.html#docker-integration
            com.symfony.server.service-prefix: 'DATABASE'

    caddy:
        container_name: caddy
        image: caddy:2.7
        restart: unless-stopped
        hostname: localhost
        ports:
            - "80:80"
            - "443:443"
            - "443:443/udp"
        volumes:
            - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile
            - ./app/public:/app/public:delegated
            - caddy_data:/data
            - caddy_config:/config
        depends_on:
            - php

    nodejs:
        container_name: nodejs
        image: node:16-alpine
        environment:
            TZ: ${TZ}
            PHP_HOST: php
            PHP_PORT: 9000
        volumes:
            - ./app:/app:rw,cached
            - ./app/public:/app/public:rw,delegated
        working_dir: /app

volumes:
    postgres_data:
    caddy_data:
    caddy_config:

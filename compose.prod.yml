services:
  php:
    container_name: symfony-docker-php
    build:
      target: php_prod
      context: .
      dockerfile: Dockerfile

  caddy:
    container_name: symfony-docker-caddy
    build:
      target: caddy_prod
      context: .
      dockerfile: Dockerfile
    environment:
      APP_DIR: /app/public
    ports:
      - "443:443"
